<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="../style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          "Plus Jakarta Sans",
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at top, #1e293b, #020617);
        color: white;
      }

      .dashboard {
        background: rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 36px 28px;
        width: 320px;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        transition:
          transform 0.3s,
          box-shadow 0.3s;
      }

      .dashboard:hover {
        transform: translateY(-3px);
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7);
      }

      .dashboard h1 {
        font-size: 22px;
        margin-bottom: 28px;
        font-weight: 700;
        letter-spacing: 0.8px;
      }

      .links {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .links a {
        text-decoration: none;
        color: white;
        padding: 14px 0;
        border-radius: 14px;
        font-weight: 600;
        font-size: 15px;
        transition: all 0.3s ease;
        box-shadow: 0 5px 15px rgba(37, 99, 235, 0.35);
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
      }

      .links a:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(37, 99, 235, 0.6);
      }

      .links a:nth-child(2) {
        background: linear-gradient(135deg, #22c55e, #16a34a);
        box-shadow: 0 5px 15px rgba(34, 197, 94, 0.35);
      }

      .links a:nth-child(2):hover {
        box-shadow: 0 10px 25px rgba(34, 197, 94, 0.6);
      }

      /* animación suave al entrar */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .dashboard {
        animation: fadeIn 0.6s ease;
      }
      .links a.redS {
        background: #ce1a1a !important; /* rojo sólido */
        box-shadow: 0 5px 15px rgba(239, 68, 68, 0.35) !important;
        color: #ffffff !important;
      }

      .links a.redS:hover {
        transform: translateY(-2px);
        background: #ec1616 !important; /* rojo más claro al pasar el mouse */
        box-shadow: 0 10px 25px rgba(226, 56, 56, 0.6) !important;
      }
    </style>
  </head>

  <body>
    <div class="dashboard">
      <h1>Panel de herramientas</h1>
      <div class="links">
        <a href="calculadora.html">Calculadora S&P 500</a>
        <a href="calculadora-hipoteca.html">Calculadora de Hipotecas</a>
        <a href="../index.html" class="redS">🛑ATRAS🛑</a>
      </div>
    </div>
  </body>
</html>
